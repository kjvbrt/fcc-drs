stages:
  - build
  - deploy
  - maintenance

variables:
  OC_SERVER: https://api.paas.okd.cern.ch

# ── Build ──────────────────────────────────────────────────────────────────────

build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - VERSION=${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}
    - |
      docker build \
        --build-arg VERSION=$VERSION \
        -t $CI_REGISTRY_IMAGE:$VERSION \
        -t $CI_REGISTRY_IMAGE:latest \
        .
    - docker push $CI_REGISTRY_IMAGE:$VERSION
    - docker push $CI_REGISTRY_IMAGE:latest
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^v\d/

# ── Deploy ─────────────────────────────────────────────────────────────────────

.deploy:
  image: gitlab-registry.cern.ch/paas-tools/openshift-client:latest
  before_script:
    - oc login $OC_SERVER --token=$OC_TOKEN

deploy-staging:
  extends: .deploy
  stage: deploy
  variables:
    OC_TOKEN: $OC_TOKEN_STAGING
  script:
    - oc apply -k openshift/overlays/staging
    - oc set image deployment/fcc-drs fcc-drs=$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA -n fcc-drs-test
    - oc rollout status deployment/fcc-drs -n fcc-drs-test --timeout=120s
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy-prod:
  extends: .deploy
  stage: deploy
  variables:
    OC_TOKEN: $OC_TOKEN_PROD
  script:
    - oc apply -k openshift/overlays/prod
    - oc set image deployment/fcc-drs fcc-drs=$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG -n fcc-drs
    - oc rollout status deployment/fcc-drs -n fcc-drs --timeout=120s
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d/
  when: manual

# ── Maintenance ────────────────────────────────────────────────────────────────

# Runs on a monthly schedule (configure in GitLab: Settings → CI/CD → Schedules).
# Fails with a notification email if either OC token expires within 30 days.
check-tokens:
  stage: maintenance
  image: python:3-alpine
  script:
    - |
      python3 - <<'EOF'
      import sys, base64, json, time, os

      WARN_DAYS = 30

      def check(name):
          token = os.environ.get(name, '')
          if not token:
              print(f"ERROR: {name} is not set")
              return False
          payload = token.split('.')[1]
          payload += '=' * (4 - len(payload) % 4)
          data = json.loads(base64.urlsafe_b64decode(payload))
          days_left = (data['exp'] - time.time()) / 86400
          print(f"{name}: expires in {int(days_left)} days")
          if days_left < WARN_DAYS:
              print(f"ERROR: {name} expires in {int(days_left)} days — renew it:")
              print(f"  oc create token gitlab-ci -n fcc-drs-test --duration=8760h  # staging")
              print(f"  oc create token gitlab-ci -n fcc-drs      --duration=8760h  # prod")
              print(f"Then update OC_TOKEN_STAGING / OC_TOKEN_PROD in:")
              print(f"  GitLab → Settings → CI/CD → Variables")
              return False
          return True

      ok = check('OC_TOKEN_STAGING') & check('OC_TOKEN_PROD')
      sys.exit(0 if ok else 1)
      EOF
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
