apiVersion: apps/v1
kind: Deployment
metadata:
  name: fcc-drs
  labels:
    app: fcc-drs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fcc-drs
  template:
    metadata:
      labels:
        app: fcc-drs
    spec:
      containers:
        - name: fcc-drs
          # Image name is overridden by each overlay via the `images` field.
          image: fcc-drs
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5050
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: fcc-drs-secrets
                  key: database-url
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: fcc-drs-secrets
                  key: oidc-client-id
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: fcc-drs-secrets
                  key: oidc-client-secret
            - name: OIDC_REDIRECT_URL
              valueFrom:
                secretKeyRef:
                  name: fcc-drs-secrets
                  key: oidc-redirect-url
          readinessProbe:
            httpGet:
              path: /login
              port: 5050
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /login
              port: 5050
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      securityContext:
        runAsNonRoot: true
        hostUsers: false
