apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: fcc-drs

resources:
  - ../../base
  - route.yaml

# Set newName to your CERN GitLab registry path and update newTag to the release tag before each deploy.
images:
  - name: fcc-drs
    newName: gitlab-registry.cern.ch/hep-fcc/fcc-drs
    newTag: v0.1.0

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: fcc-drs
      spec:
        replicas: 2
        template:
          spec:
            containers:
              - name: fcc-drs
                resources:
                  requests:
                    memory: "128Mi"
                    cpu: "100m"
                  limits:
                    memory: "512Mi"
                    cpu: "500m"
