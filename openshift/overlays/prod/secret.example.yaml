# Copy to secret.yaml, fill in real values, then apply with:
#   oc apply -f openshift/overlays/prod/secret.yaml
# secret.yaml is gitignored — never commit it with actual values.
apiVersion: v1
kind: Secret
metadata:
  name: fcc-drs-secrets
  namespace: fcc-drs
stringData:
  # Base URL for email links (no trailing slash).
  app-url: "https://fcc-drs.web.cern.ch"
  # PostgreSQL connection string from CERN DBOD (production instance).
  # Format: postgresql://user:password@dbod-host.cern.ch:5432/database?sslmode=require
  database-url: ""
  oidc-client-id: ""
  oidc-client-secret: ""
  # https://fcc-drs.web.cern.ch/auth/callback
  oidc-redirect-url: ""
  # CERN anonymous SMTP (no credentials needed)
  smtp-host: "cernmx.cern.ch"
  smtp-port: "25"
  smtp-from: "fcc-drs-noreply@cern.ch"
