{{define "content"}}

  <!-- Page heading -->
  <div class="is-flex is-flex-wrap-wrap is-align-items-center is-justify-content-space-between gap-3 mb-5">
    <div>
      <h1 class="is-size-4 has-text-weight-semibold">Dashboard</h1>
      <p class="is-size-7 has-text-grey mt-1">FCC dataset request pipeline — analysis &amp; detector design</p>
    </div>
    {{if .CurrentUser}}
    <a href="/requests/new" class="button is-link">
      <span class="icon">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
        </svg>
      </span>
      <span>New Request</span>
    </a>
    {{end}}
  </div>

  <!-- Stats -->
  <div id="stats-area" hx-get="/api/stats" hx-trigger="every 30s" hx-swap="innerHTML" class="mb-5">
    {{template "stats_cards" .}}
  </div>

  <!-- Recent requests -->
  <div>
    <div class="is-flex is-align-items-center is-justify-content-space-between mb-4">
      <h2 class="is-size-5 has-text-weight-semibold">Recent Requests</h2>
      <a href="/requests" class="is-size-7 has-text-link has-text-weight-medium">View all →</a>
    </div>
    <div id="recent-area" hx-get="/api/recent" hx-trigger="every 30s" hx-swap="innerHTML">
      {{template "recent_requests" .}}
    </div>
  </div>

{{end}}
