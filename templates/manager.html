{{define "content"}}

  <!-- Header -->
  <div class="mb-5">
    <h1 class="is-size-4 has-text-weight-semibold">Pipeline</h1>
    <p class="is-size-7 has-text-grey mt-1">Active dataset requests requiring attention</p>
  </div>

  <!-- Stats -->
  {{if .Stats}}
  <div class="columns mb-5">
    <div class="column">
      <div class="stat-card">
        <p class="is-size-4 has-text-weight-bold stat-value-amber">{{.Stats.Pending}}</p>
        <p class="is-size-7 has-text-grey has-text-weight-medium is-uppercase" style="letter-spacing:.05em;margin-top:.25rem">Under Review</p>
      </div>
    </div>
    <div class="column">
      <div class="stat-card">
        <p class="is-size-4 has-text-weight-bold stat-value-violet">{{.Stats.InProgress}}</p>
        <p class="is-size-7 has-text-grey has-text-weight-medium is-uppercase" style="letter-spacing:.05em;margin-top:.25rem">In Progress</p>
      </div>
    </div>
    <div class="column">
      <div class="stat-card">
        <p class="is-size-4 has-text-weight-bold has-text-danger">{{.Stats.Critical}}</p>
        <p class="is-size-7 has-text-grey has-text-weight-medium is-uppercase" style="letter-spacing:.05em;margin-top:.25rem">Critical</p>
      </div>
    </div>
    <div class="column">
      <div class="stat-card">
        <p class="is-size-4 has-text-weight-bold">{{.Stats.Total}}</p>
        <p class="is-size-7 has-text-grey has-text-weight-medium is-uppercase" style="letter-spacing:.05em;margin-top:.25rem">Total</p>
      </div>
    </div>
  </div>
  {{end}}

  <!-- Batch toolbar -->
  {{template "batch_toolbar" .}}

  <!-- Request list -->
  <div id="request-list-area" class="mt-4">
    {{template "request_list" .}}
  </div>

{{end}}
