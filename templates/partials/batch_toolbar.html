{{define "batch_toolbar"}}
{{if .CurrentUser.IsCoordinator}}
<div id="batch-toolbar" class="batch-toolbar is-hidden mb-4">
  <span id="batch-count" class="is-size-7 has-text-weight-semibold has-text-link mr-1">0 selected</span>
  <div class="batch-separator"></div>
  <button hx-post="/requests/batch"
          hx-include=".batch-cb:checked"
          hx-vals='{"action":"approve"}'
          hx-swap="none"
          class="button is-link is-small" style="border-radius:0.5rem">
    Approve
  </button>
  <button hx-post="/requests/batch"
          hx-include=".batch-cb:checked"
          hx-vals='{"action":"in_progress"}'
          hx-swap="none"
          class="button is-small btn-violet" style="border-radius:0.5rem">
    In Progress
  </button>
  <button hx-post="/requests/batch"
          hx-include=".batch-cb:checked"
          hx-vals='{"action":"complete"}'
          hx-swap="none"
          class="button is-success is-small" style="border-radius:0.5rem">
    Complete
  </button>
  <button hx-post="/requests/batch"
          hx-include=".batch-cb:checked"
          hx-vals='{"action":"reject"}'
          hx-swap="none"
          class="button is-danger is-small" style="border-radius:0.5rem">
    Reject
  </button>
  <button type="button" onclick="deselectAll()"
          class="button is-ghost is-small ml-auto has-text-link">
    Deselect all
  </button>
</div>
{{end}}
{{end}}
