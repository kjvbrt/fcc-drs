{{define "group_card"}}
<div id="group-{{.Group.ID}}" class="box mb-4">
  <div class="is-flex is-align-items-center is-justify-content-space-between mb-3">
    <p class="is-size-7 has-text-weight-semibold is-uppercase has-text-grey mb-0" style="letter-spacing:.05em">{{.Group.Name}}</p>
    <button
      hx-delete="/admin/groups/{{.Group.ID}}"
      hx-target="#groups-area"
      hx-swap="innerHTML"
      hx-trigger="action-confirmed"
      onclick="confirmAction(this, 'Delete group &quot;{{.Group.Name}}&quot;? This will remove all its members.')"
      class="btn-icon btn-icon-danger"
      title="Delete group">
      <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
      </svg>
    </button>
  </div>

  {{if .Group.Members}}
  <div class="mb-3">
    {{range .Group.Members}}
    <div class="panel-row mb-2">
      <div class="is-flex is-align-items-center gap-2 min-w-0">
        <div class="drs-avatar" style="width:1.5rem;height:1.5rem">
          <img src="/users/{{.Username}}/avatar" alt="{{.DisplayedName}}">
        </div>
        <span class="is-size-7 is-truncated">{{.DisplayedName}}</span>
        <span class="is-size-7 has-text-grey-light is-truncated">{{.Username}}</span>
      </div>
      <button
        hx-delete="/admin/groups/{{$.Group.ID}}/members/{{.ID}}"
        hx-target="#group-{{$.Group.ID}}"
        hx-swap="outerHTML"
        hx-trigger="action-confirmed"
        onclick="confirmAction(this, 'Remove {{.DisplayedName}} from this group?')"
        class="btn-icon btn-icon-danger is-shrink-0"
        title="Remove">
        <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
    {{end}}
  </div>
  {{else}}
  <p class="is-size-7 has-text-grey-light mb-3">No coordinators assigned.</p>
  {{end}}

  {{if .Coordinators}}
  <form hx-post="/admin/groups/{{.Group.ID}}/members"
        hx-target="#group-{{.Group.ID}}"
        hx-swap="outerHTML"
        hx-validate="true"
        class="is-flex is-align-items-center gap-2">
    <div class="select is-small is-flex-grow-1">
      <select name="user_id" required class="form-input">
        <option value="">— Add coordinator —</option>
        {{range .Coordinators}}
        <option value="{{.ID}}">{{.DisplayedName}} ({{.Username}})</option>
        {{end}}
      </select>
    </div>
    <button type="submit" class="button is-link is-small" style="border-radius:.5rem">Add</button>
  </form>
  {{end}}
</div>
{{end}}
