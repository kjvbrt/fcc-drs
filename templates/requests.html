{{define "content"}}

  <!-- Header + filters -->
  <div class="is-flex is-flex-wrap-wrap is-align-items-flex-end is-justify-content-space-between gap-4 mb-4">
    <div>
      <h1 class="is-size-4 has-text-weight-semibold">Requests</h1>
      <p class="is-size-7 has-text-grey mt-1">
        {{if .Stats}}{{.Stats.Total}} total — FCC analysis &amp; detector design datasets{{end}}
      </p>
    </div>

    <div class="is-flex is-flex-wrap-wrap is-align-items-center gap-2">
      <input
        type="text"
        name="search"
        placeholder="Search…"
        value="{{.Filter.Search}}"
        hx-get="/requests"
        hx-trigger="input changed delay:300ms"
        hx-target="#request-list-area"
        hx-include="#filter-status,#filter-priority"
        class="form-input" style="width:12rem;height:2.25rem">

      <select id="filter-status" name="status"
        hx-get="/requests"
        hx-trigger="change"
        hx-target="#request-list-area"
        hx-include="[name='search'],#filter-priority"
        class="form-input" style="width:auto;height:2.25rem">
        <option value="all"       {{if eq .Filter.Status ""}}selected{{end}}>All statuses</option>
        <option value="draft"       {{if eq .Filter.Status "draft"}}selected{{end}}>Draft</option>
        <option value="pending"     {{if eq .Filter.Status "pending"}}selected{{end}}>Under Review</option>
        <option value="approved"    {{if eq .Filter.Status "approved"}}selected{{end}}>Approved</option>
        <option value="in_progress" {{if eq .Filter.Status "in_progress"}}selected{{end}}>In Progress</option>
        <option value="completed"   {{if eq .Filter.Status "completed"}}selected{{end}}>Completed</option>
        <option value="rejected"    {{if eq .Filter.Status "rejected"}}selected{{end}}>Rejected</option>
        <option value="cancelled"   {{if eq .Filter.Status "cancelled"}}selected{{end}}>Cancelled</option>
      </select>

      <select id="filter-priority" name="priority"
        hx-get="/requests"
        hx-trigger="change"
        hx-target="#request-list-area"
        hx-include="[name='search'],#filter-status"
        class="form-input" style="width:auto;height:2.25rem">
        <option value="all"      {{if eq .Filter.Priority ""}}selected{{end}}>All priorities</option>
        <option value="critical" {{if eq .Filter.Priority "critical"}}selected{{end}}>Critical</option>
        <option value="high"     {{if eq .Filter.Priority "high"}}selected{{end}}>High</option>
        <option value="medium"   {{if eq .Filter.Priority "medium"}}selected{{end}}>Medium</option>
        <option value="low"      {{if eq .Filter.Priority "low"}}selected{{end}}>Low</option>
      </select>
    </div>
  </div>

  <!-- Batch toolbar -->
  {{template "batch_toolbar" .}}

  <!-- Request list -->
  <div id="request-list-area" class="mt-4">
    {{template "request_list" .}}
  </div>

  {{if .CurrentUser}}
  <div class="has-text-centered mt-5">
    <a href="/requests/new" class="button is-link">
      <span class="icon">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
        </svg>
      </span>
      <span>New Request</span>
    </a>
  </div>
  {{end}}

{{end}}
